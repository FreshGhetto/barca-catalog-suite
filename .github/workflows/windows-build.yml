name: Windows Portable Build

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build (onedir using spec)
        run: |
          pyinstaller --noconfirm --clean BarcaCatalogSuite.spec

      - name: Zip portable folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\BarcaCatalogSuite\*" -DestinationPath "BarcaCatalogSuite_windows_portable.zip"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: BarcaCatalogSuite_windows_portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}